<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.6/dist/mermaid.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f1f5f9; }
        #diagram-container { background: #fff; border-radius: 12px; padding: 24px; min-height: 200px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        #breadcrumb { margin-bottom: 16px; font-size: 14px; color: #64748b; }
        #breadcrumb span { cursor: pointer; color: #8b5cf6; }
        #breadcrumb span:hover { text-decoration: underline; }
        h2 { color: #0f172a; margin-top: 0; }
    </style>
</head>
<body>

<h2>Mermaid Drill-Down Test</h2>
<div id="breadcrumb"></div>
<div id="diagram-container"></div>

<script>
mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose' });

// Component names
const nodeNames = {
    imu: 'Sensordatenerfassung',
    engine: 'Inferenz-Engine',
    ble: 'BLE-Streamer',
    led: 'LED Controller',
    app: 'Mobile App'
};

// Connections between components (used to generate input/output ghost nodes)
const componentConnections = [
    { from: 'imu', to: 'engine', text: 'IMU Arrays' },
    { from: 'engine', to: 'led', text: 'Klasse, Score' },
    { from: 'engine', to: 'ble', text: 'Klasse, Score' },
    { from: 'imu', to: 'ble', text: 'Raw IMU' },
    { from: 'ble', to: 'app', text: 'JSON Stream' }
];

// Level 1: Komponenten-Übersicht
const level1 = `flowchart LR
    classDef comp fill:#ffffff,stroke:#8b5cf6,stroke-width:2px,color:#0f172a
    classDef ext fill:#f8fafc,stroke:#64748b,stroke-width:1.5px,color:#334155
    imu["Sensordatenerfassung"]:::comp
    engine["Inferenz-Engine"]:::comp
    ble["BLE-Streamer"]:::comp
    led["LED Controller"]:::comp
    app["Mobile App"]:::ext
    imu -->|"IMU Arrays"|engine
    engine -->|"Klasse, Score"|led
    engine -->|"Klasse, Score"|ble
    imu -->|"Raw IMU"|ble
    ble -->|"JSON Stream"|app
    click imu call drillDown()
    click engine call drillDown()
    click ble call drillDown()
    click led call drillDown()`;

// Level 2: Inner functions per component
const innerFunctions = {
    imu: [
        { id: 'initIMU', label: 'initIMU - C++ Function' },
        { id: 'readSensor', label: 'readSensorData - C++ Function' }
    ],
    engine: [
        { id: 'runInference', label: 'runModelInference - C++ Function' }
    ],
    ble: [
        { id: 'initBLE', label: 'initBLE - C++ Function' },
        { id: 'streamIMU', label: 'streamIMUData - C++ Function' }
    ],
    led: [
        { id: 'initFB', label: 'initFeedback - C++ Function' },
        { id: 'updateFB', label: 'updateFeedback - C++ Function' },
        { id: 'sendJson', label: 'sendJsonToPC - C++ Function' }
    ]
};

// Inner connections (within a component)
const innerConnections = {
    imu: [{ from: 'initIMU', to: 'readSensor' }],
    engine: [],
    ble: [{ from: 'initBLE', to: 'streamIMU' }],
    led: [{ from: 'initFB', to: 'updateFB' }, { from: 'updateFB', to: 'sendJson' }]
};

function buildLevel2(componentId) {
    let mmd = 'flowchart LR\n';
    mmd += '    classDef cls fill:#ffffff,stroke:#8b5cf6,stroke-width:2px,color:#0f172a\n';
    mmd += '    classDef ghost fill:#f8fafc,stroke:#94a3b8,stroke-width:1px,stroke-dasharray:5 5,color:#64748b\n';

    // Find incoming connections (other component -> this component)
    const inputs = componentConnections.filter(c => c.to === componentId);
    // Find outgoing connections (this component -> other component)
    const outputs = componentConnections.filter(c => c.from === componentId);

    // Create ghost input nodes
    inputs.forEach((inp, i) => {
        const ghostId = 'in_' + i;
        mmd += `    ${ghostId}["${nodeNames[inp.from] || inp.from}"]:::ghost\n`;
    });

    // Create inner function nodes
    const funcs = innerFunctions[componentId] || [];
    funcs.forEach(fn => {
        mmd += `    ${fn.id}["${fn.label}"]:::cls\n`;
    });

    // Create ghost output nodes
    outputs.forEach((out, i) => {
        const ghostId = 'out_' + i;
        mmd += `    ${ghostId}["${nodeNames[out.to] || out.to}"]:::ghost\n`;
    });

    // Connect inputs to first inner function
    if (funcs.length > 0) {
        inputs.forEach((inp, i) => {
            mmd += `    in_${i} -->|"${inp.text}"|${funcs[0].id}\n`;
        });
    }

    // Inner connections
    const inner = innerConnections[componentId] || [];
    inner.forEach(c => {
        mmd += `    ${c.from} --> ${c.to}\n`;
    });

    // Connect last inner function to outputs
    if (funcs.length > 0) {
        const lastFunc = funcs[funcs.length - 1].id;
        outputs.forEach((out, i) => {
            mmd += `    ${lastFunc} -->|"${out.text}"|out_${i}\n`;
        });
    }

    // Click callbacks for inner functions
    funcs.forEach(fn => {
        mmd += `    click ${fn.id} call codeClick()\n`;
    });

    return mmd;
}

// Global callbacks
window.drillDown = function(nodeId) {
    if (innerFunctions[nodeId]) {
        showLevel2(nodeId);
    }
};

window.codeClick = function(nodeId) {
    alert('Quellcode öffnen für: ' + nodeId);
};

let mermaidCounter = 0;

async function renderDiagram(mmdText) {
    const container = document.getElementById('diagram-container');
    container.innerHTML = '';

    mermaidCounter++;
    const div = document.createElement('div');
    div.className = 'mermaid';
    div.id = 'mmd-' + mermaidCounter;
    div.textContent = mmdText;
    container.appendChild(div);

    await mermaid.run({ querySelector: '#' + div.id });
}

function updateBreadcrumb(componentId) {
    const bc = document.getElementById('breadcrumb');
    if (componentId) {
        bc.innerHTML = `<span onclick="showLevel1()">⬅ Komponenten</span> &rsaquo; <b>${nodeNames[componentId]}</b>`;
    } else {
        bc.innerHTML = `<b>Komponenten-Übersicht</b> <span style="color:#94a3b8">(Klicke auf eine Komponente)</span>`;
    }
}

window.showLevel1 = function() {
    updateBreadcrumb(null);
    renderDiagram(level1);
};

function showLevel2(componentId) {
    updateBreadcrumb(componentId);
    renderDiagram(buildLevel2(componentId));
}

// Start
showLevel1();
</script>
</body>
</html>
