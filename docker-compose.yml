# MoveLink – Local Docker Environment
#
# Start:   docker compose up
# Stop:    docker compose down
# Rebuild: docker compose up --build
#
# Copy .env.example to .env before first run:
#   cp .env.example .env

services:

  # ── AP1: Frontend (Devin Uyan) ────────────────────────────────────────────
  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: movelink-frontend
    ports:
      - "8081:8081"
    environment:
      EXPO_PUBLIC_API_URL: ${EXPO_PUBLIC_API_URL:-http://localhost:3000}
      EXPO_PUBLIC_WS_URL: ${EXPO_PUBLIC_WS_URL:-ws://localhost:3000/ws}
    networks:
      - movelink-net

  # ── AP2: Backend (Luca Schöneberg) ───────────────────────────────────────
  # Activate once the backend submodule is available.
  #
  # backend:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   container_name: movelink-backend
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     DATABASE_URL: ${DATABASE_URL:-postgres://movelink:movelink@db:5432/movelink}
  #   depends_on:
  #     - db
  #   networks:
  #     - movelink-net

  # ── Database (activate together with backend) ─────────────────────────────
  #
  # db:
  #   image: postgres:16-alpine
  #   container_name: movelink-db
  #   ports:
  #     - "5432:5432"
  #   environment:
  #     POSTGRES_USER: ${POSTGRES_USER:-movelink}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-movelink}
  #     POSTGRES_DB: ${POSTGRES_DB:-movelink}
  #   volumes:
  #     - db_data:/var/lib/postgresql/data
  #   networks:
  #     - movelink-net

networks:
  movelink-net:
    driver: bridge

