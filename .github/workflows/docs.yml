# Trigger-Kommentar zur Überprüfung der Workflow-Schreibrechte
name: Continuous Documentation

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs_site/**'
  workflow_dispatch:

permissions:
  contents: read # Schreibrechte werden für Artefakte nicht benötigt, 'read' reicht hier völlig aus.

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install reportlab

      - name: Dokumentation & PDF generieren
        run: |
          python scrape_docs.py
          python generate_pdf.py

      - name: Generierte Dateien als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: dokumentation-und-pdf
          path: docs_site/ # Lädt den gesamten Ordner hoch. Passe den Pfad an, falls die PDF woanders liegt.
          retention-days: 14 # (Optional) Bestimmt, wie viele Tage das Artefakt gespeichert wird